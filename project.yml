name: BoilerCalc
options:
  bundleIdPrefix: ru.boilercalc
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

targets:
  BoilerCalc:
    type: application
    platform: iOS
    sources:
      - path: BoilerCalc
        excludes:
          - "Assets.xcassets"
          - "Info.plist"
    resources:
      - path: BoilerCalc/Assets.xcassets
    info:
      path: BoilerCalc/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ru.boilercalc.app
        PRODUCT_NAME: "Паровой калькулятор"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
